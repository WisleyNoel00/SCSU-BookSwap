{% extends "base.html" %}
{% block title %}OwlSwap — Login / Sign Up{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">

    <div class="auth-logo">
      <div class="auth-logo-icon">🦉</div>
      <div class="auth-logo-text">OwlSwap</div>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab {% if request.args.get('tab','login') == 'login' %}active{% endif %}"
              onclick="showPanel('login')" id="tab-login">Login</button>
      <button class="auth-tab {% if request.args.get('tab') == 'signup' %}active{% endif %}"
              onclick="showPanel('signup')" id="tab-signup">Sign Up</button>
    </div>

    <!-- LOGIN -->
    <div class="auth-panel {% if request.args.get('tab','login') == 'login' %}active{% endif %}" id="panel-login">
      <form method="POST" action="{{ url_for('auth') }}">
        <input type="hidden" name="action" value="login" />
        <div class="field">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" name="email" placeholder="yourname@southernct.edu" required />
        </div>
        <div class="field">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" name="password" placeholder="••••••••" required />
        </div>
        <a class="forgot-link" href="#">Forgot password?</a>
        <button type="submit" class="auth-submit">Log In</button>
      </form>
      <div class="auth-footer">
        Don't have an account? <a href="#" onclick="showPanel('signup')">Sign up</a>
      </div>
    </div>

    <!-- SIGN UP -->
    <div class="auth-panel {% if request.args.get('tab') == 'signup' %}active{% endif %}" id="panel-signup">
      <form method="POST" action="{{ url_for('auth') }}">
        <input type="hidden" name="action" value="signup" />
        <div class="field">
          <label for="signup-username">Username</label>
          <input type="text" id="signup-username" name="username" placeholder="e.g. jsmith22" required />
        </div>
        <div class="field">
          <label for="signup-email">Email</label>
          <input type="email" id="signup-email" name="email" placeholder="yourname@southernct.edu" required />
        </div>
        <div class="field">
          <label for="signup-password">Password</label>
          <input type="password" id="signup-password" name="password" placeholder="••••••••" required />
        </div>
        <button type="submit" class="auth-submit">Create Account</button>
      </form>
      <div class="auth-footer">
        Already have an account? <a href="#" onclick="showPanel('login')">Log in</a>
      </div>
    </div>

  </div>
</div>

<script>
  function showPanel(panel) {
    document.querySelectorAll('.auth-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('panel-' + panel).classList.add('active');
    document.getElementById('tab-' + panel).classList.add('active');
  }
</script>
{% endblock %}
